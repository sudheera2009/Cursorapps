name: rage_shake
description: "RAGE SHAKE - Shake your anger away. Break everything. Feel better."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^5.0.1
  vibration: ^2.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  share_plus: ^9.0.0
  audioplayers: ^6.0.0
  provider: ^6.1.2
  uuid: ^4.4.2
  confetti: ^0.7.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/images/
